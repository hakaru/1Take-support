---
layout: default
---

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ page.title | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.date | date_to_xmlschema }}",
  "author": {
    "@type": "Person",
    "name": "hakaru"
  },
  "publisher": {
    "@type": "Organization",
    "name": "hakaru apps",
    "url": "https://hakaru.net/"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "https://hakaru.net/1Take-support{{ page.url }}"
  }{% if page.summary %},
  "description": {{ page.summary | jsonify }}{% endif %}
}
</script>

<nav style="margin:12px 0 24px; display:flex; gap:12px; align-items:center;">
  <a href="{{ '/' | relative_url }}">Support</a>
  <a href="{{ '/privacy' | relative_url }}">Privacy</a>
  <a href="{{ '/privacy-ja' | relative_url }}">プライバシー</a>
  <a href="{{ '/blog/en/' | relative_url }}">Blog</a>
  <a href="{{ '/blog/ja/' | relative_url }}">ブログ</a>

  <span style="flex:1;"></span>

  {% if page.url contains '/blog/ja/' %}
    <a href="{{ page.url | replace: '/blog/ja/', '/blog/en/' | relative_url }}">EN</a>
  {% elsif page.url contains '/blog/en/' %}
    <a href="{{ page.url | replace: '/blog/en/', '/blog/ja/' | relative_url }}">日本語</a>
  {% endif %}
</nav>

{{ content }}
